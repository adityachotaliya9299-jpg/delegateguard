name: DelegateGuard

on:
  pull_request:
    paths:
      - "**/*.sol"

permissions:
  contents: read
  pull-requests: write   # required for the PR comment

jobs:
  eip7702-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: DelegateGuard scan
        uses: adityachotaliya9299-jpg/delegateguard@main
        with:
          target: contracts/
          mode: both
          fail-on: CRITICAL   # fail the build on any critical finding; use NONE to only report
          comment: "true"
