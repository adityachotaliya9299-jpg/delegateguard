name: DelegateGuard CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lab-tests:
    name: Foundry PoC tests (Phase 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install lab dependencies
        working-directory: lab
        run: forge install

      - name: Run PoC tests
        working-directory: lab
        run: forge test -vv

  python-tests:
    name: Python engines (Phases 2, 3, 4, 6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install solc (for Slither)
        run: |
          pip install solc-select
          solc-select install 0.8.26
          solc-select use 0.8.26

      - name: Install DelegateGuard
        run: pip install -e ".[dev]" || pip install -e . && pip install pytest slither-analyzer

      - name: Analyzer detectors (E1)
        run: python -m pytest analyzer/tests/ -v

      - name: Scanner detectors (E2)
        run: python -m pytest scanner/tests/ -v

      - name: Harness generator (E3)
        run: python -m pytest harness/tests/ -v

      - name: On-chain monitor (E4)
        run: python -m pytest monitor/tests/ -v

  dashboard-build:
    name: Dashboard build (Phase 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Lint
        working-directory: dashboard
        run: npm run lint

      - name: Production build
        working-directory: dashboard
        run: npm run build
